baseURL: "https://arquitectosrp.com/"
title: "Arquitectos RP"
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

module:
  imports:
    - path: github.com/half-duplex/hugo-arcana

languages:
  en:
    languageName: "English"
    weight: 1
    title: "Arquitectos RP"
    menu:
      main:
        - name: "Home"
          pageRef: "/"
          weight: 1
  es:
    languageName: "Español"
    weight: 2
    title: "Arquitectos RP"
    menu:
      main:
        - name: "Inicio"
          pageRef: "/"
          weight: 1

disableKinds:
  - taxonomy
  - term
  - RSS

markup:
  goldmark:
    renderer:
      unsafe: true
